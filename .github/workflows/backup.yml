name: Respaldo BD (Aiven)

on:
  schedule:
    - cron: '0 6 * * 1'   # cada lunes 06:00 UTC
  workflow_dispatch: {}    # permite ejecutarlo a mano desde la pestaña Actions

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install "psycopg[binary]>=3.2.0"
      - name: Generar respaldo
        env:
          DATABASE_URL: ${{ secrets.AIVEN_DATABASE_URL }}
        run: python scripts/backup_db.py
      - name: Subir respaldo como artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: backups/*.json
          retention-days: 90
